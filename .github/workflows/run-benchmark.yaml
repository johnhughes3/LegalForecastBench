name: Run Benchmark

on:
  workflow_dispatch:
    inputs:
      release_sha:
        description: Optional commit SHA to evaluate. If set, it must be reachable from origin/main.
        required: false
        type: string
      cycle_id:
        description: Frozen official cycle id.
        required: true
        default: pilot-2026-05-18-review-scored-12-corrected
        type: string
      run_input_manifest_uri:
        description: s3:// URI, manifests/ key, or checked-out file path for the run-input manifest.
        required: true
        default: manifests/pilot-2026-05-18-review-scored-12-corrected.run-inputs.json
        type: string
      labels_uri:
        description: s3:// URI, manifests/ key, or checked-out JSONL path for locked labels.
        required: true
        default: manifests/pilot-2026-05-18-review-scored-12-corrected.labels.jsonl
        type: string
      ablations:
        description: Comma-separated packet ablations to evaluate.
        required: true
        default: full_packet,metadata_only
        type: string
      model_registry_uri:
        description: Frozen model registry s3:// URI, manifests/ key, or checked-out JSON path.
        required: true
        default: manifests/pilot-2026-05-18-review-scored-12-corrected.model-registry.json
        type: string
      model_keys:
        description: Comma-separated registry keys in provider:model_id form.
        required: true
        default: openai:gpt-5.4-mini,anthropic:claude-sonnet-4-6
        type: string
      freeze_bundle_path:
        description: Optional committed current freeze bundle path; defaults to manifests/<cycle_id>.freeze.json.
        required: false
        default: ""
        type: string
      prior_dispatches_json:
        description: JSON array of prior workflow dispatches and their freeze/model provenance; required for amendments.
        required: false
        default: "[]"
        type: string
      cycle_series:
        description: Cadence classification for the aggregate cycle-power report.
        required: true
        default: pilot
        type: choice
        options:
          - pilot
          - rapid
          - official
          - annual_aggregate
      clean_motion_count:
        description: Clean motion count for the aggregate cycle-power report.
        required: true
        default: "25"
        type: string
      prediction_unit_count:
        description: Prediction-unit count for the aggregate cycle-power report.
        required: true
        default: "1"
        type: string
      allow_no_baselines:
        description: >-
          Permit aggregation without a statistical baseline corpus. Defaults to
          true for run-1: no historical baseline training corpus has been frozen
          yet, so the first cycle ships model rows only and discloses the absence
          in the run card. Set to false once baseline_training_examples_uri
          points at a real corpus so aggregation fails loud on a missing baseline.
        required: true
        default: true
        type: boolean
      baseline_training_examples_uri:
        description: >-
          Optional s3:// URI, manifests/ key, or checked-out path to the frozen
          baseline-training corpus. When set, global, court/NOS/motion,
          metadata-only, and judge-history baselines are scored as pseudo-model
          rows. Leave empty for run-1 until a baseline corpus is frozen.
        required: false
        default: ""
        type: string
      elapsed_days:
        description: Optional elapsed days for rapid-cycle power classification.
        required: false
        default: ""
        type: string
      official_window_days:
        description: Optional official window length in days.
        required: false
        default: ""
        type: string
      repeat_sample_case_ids:
        description: Optional comma-separated case IDs to run with repeat_count for within-model variance measurement.
        required: false
        default: ""
        type: string
      repeat_count:
        description: Independent provider calls for each selected repeat-sample case.
        required: true
        default: "1"
        type: string
      max_parallel:
        description: Maximum concurrent case jobs.
        required: true
        default: "4"
        type: string
      dry_run:
        description: Build and validate the matrix without fetching packets or uploading outputs.
        required: true
        default: true
        type: boolean
      resume_existing_results:
        description: Reuse complete matching per-case results already in the durable results store.
        required: true
        default: true
        type: boolean
      artifact_retention_days:
        description: Retention for non-sensitive per-case GitHub artifacts.
        required: true
        default: "14"
        type: string
      max_projected_model_cost_usd:
        description: Optional hard cap for projected model API spend before the matrix fans out.
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: run-benchmark-${{ inputs.cycle_id }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-matrix:
    name: Build benchmark matrix
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 20
    environment: legalforecastbench-official-eval
    permissions:
      contents: read
      id-token: write
    outputs:
      artifact_retention_days: ${{ steps.validate.outputs.artifact_retention_days }}
      case_count: ${{ steps.matrix.outputs.case_count }}
      frozen_manifest_sha256: ${{ steps.freeze_labels.outputs.frozen_manifest_sha256 }}
      freeze_bundle_path: ${{ steps.validate.outputs.freeze_bundle_path }}
      labels_sha256: ${{ steps.freeze_labels.outputs.labels_sha256 }}
      matrix: ${{ steps.matrix.outputs.matrix }}
      max_parallel: ${{ steps.validate.outputs.max_parallel }}
      model_count: ${{ steps.matrix.outputs.model_count }}
      projected_model_cost_usd: ${{ steps.matrix.outputs.projected_model_cost_usd }}
      release_sha: ${{ steps.validate.outputs.release_sha }}
    env:
      AWS_REGION: ${{ vars.LFB_AWS_REGION || 'us-east-1' }}
      LFB_GITHUB_PACKET_READ_ROLE_ARN: ${{ vars.LFB_GITHUB_PACKET_READ_ROLE_ARN }}
      LFB_PACKET_BUCKET: ${{ vars.LFB_PACKET_BUCKET }}
      LFB_RESULTS_BUCKET: ${{ vars.LFB_RESULTS_BUCKET }}
      MODEL_KEYS: ${{ inputs.model_keys }}
      MODEL_REGISTRY_URI: ${{ inputs.model_registry_uri }}
      RUN_INPUT_MANIFEST_URI: ${{ inputs.run_input_manifest_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Validate dispatch request
        id: validate
        shell: bash
        env:
          ARTIFACT_RETENTION_DAYS_INPUT: ${{ inputs.artifact_retention_days }}
          ABLATIONS_INPUT: ${{ inputs.ablations }}
          CLEAN_MOTION_COUNT_INPUT: ${{ inputs.clean_motion_count }}
          CYCLE_ID_INPUT: ${{ inputs.cycle_id }}
          DRY_RUN_INPUT: ${{ inputs.dry_run }}
          ELAPSED_DAYS_INPUT: ${{ inputs.elapsed_days }}
          HAS_ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
          HAS_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY != '' }}
          HAS_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY != '' }}
          FREEZE_BUNDLE_PATH_INPUT: ${{ inputs.freeze_bundle_path }}
          LABELS_URI: ${{ inputs.labels_uri }}
          LFB_ANTHROPIC_BEDROCK_MODEL_ID: ${{ vars.LFB_ANTHROPIC_BEDROCK_MODEL_ID }}
          LFB_ANTHROPIC_RUNTIME: ${{ vars.LFB_ANTHROPIC_RUNTIME }}
          MAX_PROJECTED_MODEL_COST_USD_INPUT: ${{ inputs.max_projected_model_cost_usd }}
          MAX_PARALLEL_INPUT: ${{ inputs.max_parallel }}
          OFFICIAL_WINDOW_DAYS_INPUT: ${{ inputs.official_window_days }}
          PREDICTION_UNIT_COUNT_INPUT: ${{ inputs.prediction_unit_count }}
          REPEAT_COUNT_INPUT: ${{ inputs.repeat_count }}
          RELEASE_SHA_INPUT: ${{ inputs.release_sha }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "Official evaluation is allowed only from refs/heads/main." >&2
            exit 1
          fi
          case "${RUN_INPUT_MANIFEST_URI}" in
            s3://*|manifests/*|./*|/*|[A-Za-z0-9._-]*.json) ;;
            *)
              echo "run_input_manifest_uri must be s3://, manifests/, or a JSON file path." >&2
              exit 1
              ;;
          esac
          case "${LABELS_URI}" in
            s3://*|manifests/*|./*|/*|[A-Za-z0-9._-]*.jsonl) ;;
            *)
              echo "labels_uri must be s3://, manifests/, or a JSONL file path." >&2
              exit 1
              ;;
          esac
          case "${MODEL_REGISTRY_URI}" in
            s3://*|manifests/*|model_registries/*.json|./*|/*|[A-Za-z0-9._/-]*.json) ;;
            *)
              echo "model_registry_uri must be s3://, manifests/, model_registries/, or a JSON file path." >&2
              exit 1
              ;;
          esac
          case "${RUN_INPUT_MANIFEST_URI}" in
            source-documents/*|extracted-text/*|audit-bundles/*|withdrawn/*|quarantine/*)
              echo "run_input_manifest_uri must not point at private packet prefixes." >&2
              exit 1
              ;;
          esac
          case "${LABELS_URI}" in
            source-documents/*|extracted-text/*|audit-bundles/*|withdrawn/*|quarantine/*)
              echo "labels_uri must not point at private packet prefixes." >&2
              exit 1
              ;;
          esac
          case "${MODEL_REGISTRY_URI}" in
            source-documents/*|extracted-text/*|audit-bundles/*|withdrawn/*|quarantine/*)
              echo "model_registry_uri must not point at private packet prefixes." >&2
              exit 1
              ;;
          esac
          if [[ -z "${MODEL_KEYS//[[:space:]]/}" ]]; then
            echo "model_keys must include at least one provider:model_id key." >&2
            exit 1
          fi
          freeze_bundle_path="${FREEZE_BUNDLE_PATH_INPUT//[[:space:]]/}"
          if [[ -z "${freeze_bundle_path}" ]]; then
            freeze_bundle_path="manifests/${CYCLE_ID_INPUT}.freeze.json"
          fi
          case "${freeze_bundle_path}" in
            manifests/*.freeze.json) ;;
            *)
              echo "freeze_bundle_path must be a committed manifests/*.freeze.json path." >&2
              exit 1
              ;;
          esac
          if [[ "${freeze_bundle_path}" == *".."* ]]; then
            echo "freeze_bundle_path must not contain '..'." >&2
            exit 1
          fi
          if [[ -z "${ABLATIONS_INPUT//[[:space:]]/}" ]]; then
            echo "ablations must include at least one packet ablation." >&2
            exit 1
          fi
          IFS=',' read -ra requested_ablations <<< "${ABLATIONS_INPUT}"
          declare -A seen_ablations=()
          for raw_ablation in "${requested_ablations[@]}"; do
            ablation="${raw_ablation//[[:space:]]/}"
            [[ -z "${ablation}" ]] && continue
            case "${ablation}" in
              full_packet|metadata_only|briefs_only_redacted|judge_removed|no_briefs) ;;
              *)
                echo "Unsupported ablation: ${ablation}" >&2
                exit 1
                ;;
            esac
            if [[ -n "${seen_ablations[${ablation}]:-}" ]]; then
              echo "duplicate ablation: ${ablation}" >&2
              exit 1
            fi
            seen_ablations["${ablation}"]=1
          done
          if [[ "${DRY_RUN_INPUT}" != "true" ]]; then
            missing_provider_values=()
            IFS=',' read -ra requested_provider_keys <<< "${MODEL_KEYS}"
            for raw_key in "${requested_provider_keys[@]}"; do
              key="${raw_key//[[:space:]]/}"
              [[ -z "${key}" ]] && continue
              case "${key}" in
                openai:*)
                  [[ "${HAS_OPENAI_API_KEY}" == "true" ]] || missing_provider_values+=("OPENAI_API_KEY")
                  ;;
                google:*|gemini:*)
                  [[ "${HAS_GEMINI_API_KEY}" == "true" ]] || missing_provider_values+=("GEMINI_API_KEY")
                  ;;
                anthropic:*)
                  case "${LFB_ANTHROPIC_RUNTIME:-}" in
                    bedrock|aws-bedrock|aws_bedrock)
                      [[ -n "${LFB_ANTHROPIC_BEDROCK_MODEL_ID:-}" ]] || missing_provider_values+=("LFB_ANTHROPIC_BEDROCK_MODEL_ID")
                      ;;
                    *)
                      [[ "${HAS_ANTHROPIC_API_KEY}" == "true" ]] || missing_provider_values+=("ANTHROPIC_API_KEY")
                      ;;
                  esac
                  ;;
                *)
                  echo "Unsupported model provider in model key: ${key}" >&2
                  exit 1
                  ;;
              esac
            done
            if (( ${#missing_provider_values[@]} > 0 )); then
              printf '%s\n' "${missing_provider_values[@]}" \
                | sort -u \
                | sed 's/^/  - /' \
                | {
                    echo "Non-dry-run official evaluation is missing provider credentials/settings:" >&2
                    cat >&2
                  }
              exit 1
            fi
          fi
          if ! [[ "${MAX_PARALLEL_INPUT}" =~ ^[0-9]+$ ]] || (( MAX_PARALLEL_INPUT < 1 || MAX_PARALLEL_INPUT > 64 )); then
            echo "max_parallel must be an integer from 1 through 64." >&2
            exit 1
          fi
          if ! [[ "${ARTIFACT_RETENTION_DAYS_INPUT}" =~ ^[0-9]+$ ]] || (( ARTIFACT_RETENTION_DAYS_INPUT < 1 || ARTIFACT_RETENTION_DAYS_INPUT > 90 )); then
            echo "artifact_retention_days must be an integer from 1 through 90." >&2
            exit 1
          fi
          if ! [[ "${CLEAN_MOTION_COUNT_INPUT}" =~ ^[0-9]+$ ]]; then
            echo "clean_motion_count must be a non-negative integer." >&2
            exit 1
          fi
          if ! [[ "${PREDICTION_UNIT_COUNT_INPUT}" =~ ^[0-9]+$ ]]; then
            echo "prediction_unit_count must be a non-negative integer." >&2
            exit 1
          fi
          if [[ -n "${ELAPSED_DAYS_INPUT//[[:space:]]/}" ]] && ! [[ "${ELAPSED_DAYS_INPUT}" =~ ^[0-9]+$ ]]; then
            echo "elapsed_days must be blank or a non-negative integer." >&2
            exit 1
          fi
          if [[ -n "${OFFICIAL_WINDOW_DAYS_INPUT//[[:space:]]/}" ]]; then
            if ! [[ "${OFFICIAL_WINDOW_DAYS_INPUT}" =~ ^[0-9]+$ ]] || [[ "${OFFICIAL_WINDOW_DAYS_INPUT}" == "0" ]]; then
              echo "official_window_days must be blank or a positive integer." >&2
              exit 1
            fi
          fi
          if ! [[ "${REPEAT_COUNT_INPUT}" =~ ^[0-9]+$ ]] || (( REPEAT_COUNT_INPUT < 1 || REPEAT_COUNT_INPUT > 10 )); then
            echo "repeat_count must be an integer from 1 through 10." >&2
            exit 1
          fi
          if [[ -n "${MAX_PROJECTED_MODEL_COST_USD_INPUT//[[:space:]]/}" ]] && ! [[ "${MAX_PROJECTED_MODEL_COST_USD_INPUT}" =~ ^[0-9]+([.][0-9]+)?$ ]]; then
            echo "max_projected_model_cost_usd must be a non-negative decimal amount." >&2
            exit 1
          fi
          git fetch origin main --prune
          if [[ -z "${RELEASE_SHA_INPUT}" ]]; then
            release_sha="$(git rev-parse --verify "origin/main^{commit}")"
          else
            release_sha="$(git rev-parse --verify "${RELEASE_SHA_INPUT}^{commit}")"
          fi
          if ! git merge-base --is-ancestor "${release_sha}" origin/main; then
            echo "release_sha must be reachable from origin/main." >&2
            exit 1
          fi
          {
            echo "artifact_retention_days=${ARTIFACT_RETENTION_DAYS_INPUT}"
            echo "freeze_bundle_path=${freeze_bundle_path}"
            echo "max_parallel=${MAX_PARALLEL_INPUT}"
            echo "release_sha=${release_sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Configure AWS OIDC credentials
        if: ${{ startsWith(inputs.run_input_manifest_uri, 's3://') || startsWith(inputs.run_input_manifest_uri, 'manifests/') || startsWith(inputs.model_registry_uri, 's3://') || startsWith(inputs.model_registry_uri, 'manifests/') || startsWith(inputs.labels_uri, 's3://') || startsWith(inputs.labels_uri, 'manifests/') }}
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: lfb-official-matrix-${{ github.run_id }}
          role-to-assume: ${{ env.LFB_GITHUB_PACKET_READ_ROLE_ARN }}

      - name: Download run-input manifest
        shell: bash
        run: |
          set -euo pipefail
          case "${RUN_INPUT_MANIFEST_URI}" in
            s3://*)
              aws s3 cp "${RUN_INPUT_MANIFEST_URI}" /tmp/lfb-run-inputs.json --only-show-errors
              ;;
            manifests/*)
              if [[ -z "${LFB_RESULTS_BUCKET:-}" ]]; then
                echo "LFB_RESULTS_BUCKET is required for manifests/ inputs." >&2
                exit 1
              fi
              aws s3 cp "s3://${LFB_RESULTS_BUCKET}/${RUN_INPUT_MANIFEST_URI}" /tmp/lfb-run-inputs.json --only-show-errors
              ;;
            *)
              cp "${RUN_INPUT_MANIFEST_URI}" /tmp/lfb-run-inputs.json
              ;;
          esac

      - name: Download labels
        shell: bash
        env:
          LABELS_URI: ${{ inputs.labels_uri }}
        run: |
          set -euo pipefail
          case "${LABELS_URI}" in
            s3://*)
              aws s3 cp "${LABELS_URI}" /tmp/lfb-labels.jsonl --only-show-errors
              ;;
            manifests/*)
              if [[ -z "${LFB_RESULTS_BUCKET:-}" ]]; then
                echo "LFB_RESULTS_BUCKET is required for manifests/ labels." >&2
                exit 1
              fi
              aws s3 cp "s3://${LFB_RESULTS_BUCKET}/${LABELS_URI}" /tmp/lfb-labels.jsonl --only-show-errors
              ;;
            *)
              cp "${LABELS_URI}" /tmp/lfb-labels.jsonl
              ;;
          esac

      - name: Freeze labels into run-input manifest
        id: freeze_labels
        shell: bash
        run: |
          set -euo pipefail
          # Keep this security-sensitive transform visible in the workflow. The
          # standalone CLI implements the same operation for operators, but this
          # OIDC-enabled job deliberately executes only Python's standard library.
          python - <<'PY'
          import hashlib
          import json
          import os
          import re
          from pathlib import Path

          manifest_path = Path("/tmp/lfb-run-inputs.json")
          labels_path = Path("/tmp/lfb-labels.jsonl")
          frozen_path = Path("/tmp/lfb-run-inputs-frozen.json")

          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          if not isinstance(manifest, dict):
              raise SystemExit("run-input manifest must be a JSON object")
          cycle_id = manifest.get("cycle_id")
          if not isinstance(cycle_id, str) or not cycle_id.strip():
              raise SystemExit("run-input manifest requires cycle_id")
          if not isinstance(manifest.get("model_packets"), list):
              raise SystemExit("run-input manifest requires model_packets list")

          digest = hashlib.sha256()
          with labels_path.open("rb") as handle:
              for chunk in iter(lambda: handle.read(1024 * 1024), b""):
                  digest.update(chunk)
          labels_sha256 = digest.hexdigest()
          existing = manifest.get("labels_sha256")
          if existing not in (None, ""):
              if not isinstance(existing, str) or re.fullmatch(
                  r"[0-9a-f]{64}", existing
              ) is None:
                  raise SystemExit(
                      "existing labels_sha256 must be a lowercase SHA-256 hex digest"
                  )
              if existing != labels_sha256:
                  raise SystemExit(
                      "run-input manifest already commits to different labels; "
                      "refusing to replace labels_sha256"
                  )

          frozen_manifest = dict(manifest)
          frozen_manifest["labels_sha256"] = labels_sha256
          frozen_bytes = (
              json.dumps(frozen_manifest, indent=2, sort_keys=True) + "\n"
          ).encode("utf-8")
          frozen_path.write_bytes(frozen_bytes)
          frozen_manifest_sha256 = hashlib.sha256(frozen_bytes).hexdigest()

          with Path(os.environ["GITHUB_OUTPUT"]).open(
              "a", encoding="utf-8"
          ) as output:
              output.write(f"labels_sha256={labels_sha256}\n")
              output.write(
                  f"frozen_manifest_sha256={frozen_manifest_sha256}\n"
              )
          print(f"labels frozen: {labels_sha256}")
          print(f"frozen manifest: {frozen_manifest_sha256}")
          PY

      - name: Verify labels frozen before scoring
        shell: bash
        env:
          EXPECTED_FROZEN_MANIFEST_SHA256: ${{ steps.freeze_labels.outputs.frozen_manifest_sha256 }}
          EXPECTED_LABELS_SHA256: ${{ steps.freeze_labels.outputs.labels_sha256 }}
        run: |
          set -euo pipefail
          # Fail-closed at dispatch, before any model output exists: the frozen
          # run-input manifest must record labels_sha256 and it must match the
          # labels file that will later be scored. Aggregation re-checks this, but
          # verifying here proves the labels were locked before the run fanned out.
          python - <<'PY'
          import hashlib
          import json
          import os
          import sys

          with open("/tmp/lfb-run-inputs-frozen.json", encoding="utf-8") as handle:
              manifest = json.load(handle)
          expected_labels = os.environ["EXPECTED_LABELS_SHA256"]
          frozen = manifest.get("labels_sha256")
          if frozen != expected_labels:
              sys.exit(
                  "frozen run-input manifest does not contain the labels hash "
                  "produced before fanout"
              )
          digest = hashlib.sha256()
          with open("/tmp/lfb-labels.jsonl", "rb") as handle:
              for chunk in iter(lambda: handle.read(1024 * 1024), b""):
                  digest.update(chunk)
          actual = digest.hexdigest()
          if actual != expected_labels:
              sys.exit(
                  f"labels hash drift: manifest froze {expected_labels} but labels file "
                  f"hashes to {actual}; refusing to run"
              )
          with open("/tmp/lfb-run-inputs-frozen.json", "rb") as handle:
              frozen_manifest_sha256 = hashlib.sha256(handle.read()).hexdigest()
          expected_manifest = os.environ["EXPECTED_FROZEN_MANIFEST_SHA256"]
          if frozen_manifest_sha256 != expected_manifest:
              sys.exit(
                  "frozen run-input manifest hash changed before fanout; refusing to run"
              )
          print(f"labels frozen: {actual}")
          PY

      - name: Download frozen model registry
        shell: bash
        run: |
          set -euo pipefail
          case "${MODEL_REGISTRY_URI}" in
            s3://*)
              aws s3 cp "${MODEL_REGISTRY_URI}" /tmp/lfb-model-registry.json --only-show-errors
              ;;
            manifests/*)
              if [[ -z "${LFB_RESULTS_BUCKET:-}" ]]; then
                echo "LFB_RESULTS_BUCKET is required for manifests/ registry inputs." >&2
                exit 1
              fi
              aws s3 cp "s3://${LFB_RESULTS_BUCKET}/${MODEL_REGISTRY_URI}" /tmp/lfb-model-registry.json --only-show-errors
              ;;
            *)
              cp "${MODEL_REGISTRY_URI}" /tmp/lfb-model-registry.json
              ;;
          esac

      - name: Verify pre-run freeze commitment
        shell: bash
        env:
          CYCLE_ID: ${{ inputs.cycle_id }}
          FREEZE_COMMITMENT_PATH: ${{ steps.validate.outputs.freeze_bundle_path }}
          LABELS_PATH: /tmp/lfb-labels.jsonl
          MODEL_REGISTRY_PATH: /tmp/lfb-model-registry.json
        run: |
          set -euo pipefail
          if [[ ! -f "${FREEZE_COMMITMENT_PATH}" ]]; then
            echo "pre-run freeze commitment is missing: ${FREEZE_COMMITMENT_PATH}" >&2
            exit 1
          fi
          amendment_args=()
          while IFS= read -r bundle_path; do
            if [[ "${bundle_path}" != "${FREEZE_COMMITMENT_PATH}" ]]; then
              amendment_args+=(--amendment-bundle "${bundle_path}")
            fi
          done < <(find manifests -type f -name '*.freeze.json' -print | sort)
          python -m legalforecast.protocol.freeze verify \
            --bundle "${FREEZE_COMMITMENT_PATH}" \
            --cycle-id "${CYCLE_ID}" \
            --root "." \
            --artifact-path "labels=${LABELS_PATH}" \
            --artifact-path "model_registry=${MODEL_REGISTRY_PATH}" \
            "${amendment_args[@]}"

      - name: Validate staged dispatch and build provenance
        shell: bash
        env:
          CYCLE_ID: ${{ inputs.cycle_id }}
          FREEZE_COMMITMENT_PATH: ${{ steps.validate.outputs.freeze_bundle_path }}
          MODEL_KEYS: ${{ inputs.model_keys }}
          MODEL_REGISTRY_PATH: /tmp/lfb-model-registry.json
          PRIOR_DISPATCHES_JSON: ${{ inputs.prior_dispatches_json }}
          WORKFLOW_RUN_ATTEMPT: ${{ github.run_attempt }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          candidate_args=()
          while IFS= read -r bundle_path; do
            candidate_args+=(--candidate-freeze-bundle "${bundle_path}")
          done < <(find manifests -type f -name '*.freeze.json' -print | sort)
          model_key_args=()
          IFS=',' read -ra requested_provider_keys <<< "${MODEL_KEYS}"
          for raw_key in "${requested_provider_keys[@]}"; do
            key="${raw_key//[[:space:]]/}"
            [[ -z "${key}" ]] && continue
            model_key_args+=(--requested-model-key "${key}")
          done
          python -m legalforecast.publication.dispatch_provenance \
            --current-freeze-bundle "${FREEZE_COMMITMENT_PATH}" \
            "${candidate_args[@]}" \
            --root . \
            --current-model-registry "${MODEL_REGISTRY_PATH}" \
            --prior-dispatches-json "${PRIOR_DISPATCHES_JSON}" \
            --workflow-run-id "${WORKFLOW_RUN_ID}" \
            --workflow-run-attempt "${WORKFLOW_RUN_ATTEMPT}" \
            --supersedes-report-uri "s3://${LFB_RESULTS_BUCKET}/reports/${CYCLE_ID}/multi-ablation/" \
            "${model_key_args[@]}" \
            --output /tmp/lfb-dispatch-provenance.json

      - name: Build matrix JSON
        id: matrix
        shell: bash
        env:
          ABLATIONS: ${{ inputs.ablations }}
          CYCLE_ID: ${{ inputs.cycle_id }}
          MATRIX_LIMIT: "256"
          MAX_PROJECTED_MODEL_COST_USD: ${{ inputs.max_projected_model_cost_usd }}
          MODEL_KEYS: ${{ inputs.model_keys }}
          MODEL_REGISTRY_PATH: /tmp/lfb-model-registry.json
          REPEAT_COUNT: ${{ inputs.repeat_count }}
          REPEAT_SAMPLE_CASE_IDS: ${{ inputs.repeat_sample_case_ids }}
          RUN_INPUT_MANIFEST_PATH: /tmp/lfb-run-inputs-frozen.json
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import math
          import os
          import re
          import sys

          PRICE_UNITS_PER_TOKEN = 1_000_000

          with open(os.environ["RUN_INPUT_MANIFEST_PATH"], encoding="utf-8") as handle:
              manifest = json.load(handle)
          with open(os.environ["MODEL_REGISTRY_PATH"], encoding="utf-8") as handle:
              registry_records = json.load(handle)
          if manifest.get("cycle_id") != os.environ["CYCLE_ID"]:
              raise SystemExit("run-input manifest cycle_id does not match dispatch input")
          packets = manifest.get("model_packets")
          if not isinstance(packets, list):
              raise SystemExit("run-input manifest must contain model_packets list")
          if not isinstance(registry_records, list):
              raise SystemExit("model registry must contain a JSON array")

          registry_by_key = {}
          for record in registry_records:
              if not isinstance(record, dict):
                  raise SystemExit("model registry entries must be objects")
              provider = record.get("provider")
              model_id = record.get("model_id")
              if not isinstance(provider, str) or not isinstance(model_id, str):
                  raise SystemExit("model registry entries require provider and model_id")
              registry_key = f"{provider}:{model_id}"
              registry_by_key[registry_key] = record

          requested_model_keys = [
              key.strip()
              for key in os.environ["MODEL_KEYS"].split(",")
              if key.strip()
          ]
          if not requested_model_keys:
              raise SystemExit("model_keys must include at least one provider:model_id key")
          duplicate_model_keys = sorted(
              {
                  key
                  for key in requested_model_keys
                  if requested_model_keys.count(key) > 1
              }
          )
          if duplicate_model_keys:
              raise SystemExit(f"duplicate model_keys: {duplicate_model_keys}")
          missing_model_keys = [
              key for key in requested_model_keys if key not in registry_by_key
          ]
          if missing_model_keys:
              raise SystemExit(f"model_keys missing from registry: {missing_model_keys}")
          requested_ablations = [
              ablation.strip()
              for ablation in os.environ["ABLATIONS"].split(",")
              if ablation.strip()
          ]
          if not requested_ablations:
              raise SystemExit("ablations must include at least one packet ablation")
          duplicate_ablations = sorted(
              {
                  ablation
                  for ablation in requested_ablations
                  if requested_ablations.count(ablation) > 1
              }
          )
          if duplicate_ablations:
              raise SystemExit(f"duplicate ablations: {duplicate_ablations}")
          supported_ablations = {
              "full_packet",
              "metadata_only",
              "briefs_only_redacted",
              "judge_removed",
              "no_briefs",
          }
          unsupported_ablations = sorted(
              set(requested_ablations) - supported_ablations
          )
          if unsupported_ablations:
              raise SystemExit(f"unsupported ablations: {unsupported_ablations}")
          requested_ablation_set = set(requested_ablations)
          repeat_sample_case_ids = {
              case_id.strip()
              for case_id in os.environ["REPEAT_SAMPLE_CASE_IDS"].split(",")
              if case_id.strip()
          }
          repeat_count = int(os.environ["REPEAT_COUNT"])

          def packet_input_tokens(packet):
              for field_name in (
                  "estimated_input_tokens",
                  "input_tokens",
                  "prompt_tokens",
                  "estimated_prompt_tokens",
                  "packet_token_count",
                  "token_count",
              ):
                  value = packet.get(field_name)
                  if isinstance(value, int) and not isinstance(value, bool) and value >= 0:
                      return value
              packet_size_bytes = packet.get("packet_size_bytes")
              if isinstance(packet_size_bytes, int) and packet_size_bytes >= 0:
                  return math.ceil(packet_size_bytes / 4)
              raise SystemExit(
                  "each matrix row requires packet token counts or packet_size_bytes "
                  "for cost projection"
              )

          def projected_cost_for_row(*, input_tokens, registry_record):
              input_price = required_nonnegative_number(
                  registry_record,
                  "input_token_price",
              )
              output_price = required_nonnegative_number(
                  registry_record,
                  "output_token_price",
              )
              max_output_tokens = required_nonnegative_int(
                  registry_record,
                  "max_output_tokens",
              )
              return (
                  (input_tokens * input_price)
                  + (max_output_tokens * output_price)
              ) / PRICE_UNITS_PER_TOKEN

          def required_nonnegative_number(record, field_name):
              value = record.get(field_name)
              if not isinstance(value, (int, float)) or isinstance(value, bool) or value < 0:
                  raise SystemExit(f"model registry {field_name} must be non-negative")
              return float(value)

          def required_nonnegative_int(record, field_name):
              value = record.get(field_name)
              if not isinstance(value, int) or isinstance(value, bool) or value < 0:
                  raise SystemExit(f"model registry {field_name} must be a non-negative integer")
              return value

          include = []
          projected_model_cost = 0.0
          seen_packet_rows = set()
          for packet in packets:
              if not isinstance(packet, dict):
                  raise SystemExit("model_packets entries must be objects")
              ablation = packet.get("ablation", "full_packet")
              if ablation not in requested_ablation_set:
                  continue
              case_id = packet.get("case_id")
              packet_object_key = (
                  packet.get("packet_object_key")
                  or packet.get("object_key")
                  or packet.get("key")
              )
              if not isinstance(case_id, str) or not case_id:
                  raise SystemExit("each matrix row requires case_id")
              packet_row_key = (case_id, ablation)
              if packet_row_key in seen_packet_rows:
                  raise SystemExit(f"duplicate packet row for ablation: {case_id}")
              if not isinstance(packet_object_key, str) or not packet_object_key.startswith("model-packets/"):
                  raise SystemExit("each matrix row requires model-packets/ packet_object_key")
              sha256_value = packet.get("sha256")
              packet_sha256_value = packet.get("packet_sha256")
              for field_name, value in (
                  ("sha256", sha256_value),
                  ("packet_sha256", packet_sha256_value),
              ):
                  if value is not None and (
                      not isinstance(value, str)
                      or re.fullmatch(r"[0-9a-f]{64}", value) is None
                  ):
                      raise SystemExit(
                          f"each matrix row {field_name} must be a lowercase SHA-256"
                      )
              if sha256_value is None and packet_sha256_value is None:
                  raise SystemExit(
                      "each matrix row requires sha256 or packet_sha256"
                  )
              if (
                  sha256_value is not None
                  and packet_sha256_value is not None
                  and sha256_value != packet_sha256_value
              ):
                  raise SystemExit(
                      "matrix row has conflicting sha256 and packet_sha256"
                  )
              packet_sha256 = sha256_value or packet_sha256_value
              input_tokens = packet_input_tokens(packet)
              seen_packet_rows.add(packet_row_key)
              row_repeat_count = (
                  repeat_count if case_id in repeat_sample_case_ids else 1
              )
              for model_key in requested_model_keys:
                  projected_model_cost += row_repeat_count * projected_cost_for_row(
                      input_tokens=input_tokens,
                      registry_record=registry_by_key[model_key],
                  )
                  include.append(
                      {
                          "case_id": case_id,
                          "ablation": ablation,
                          "packet_object_key": packet_object_key,
                          "packet_sha256": packet_sha256,
                          "model_key": model_key,
                          "model_key_slug": re.sub(r"[^A-Za-z0-9._-]+", "-", model_key).strip("-"),
                          "repeat_count": row_repeat_count,
                      }
                  )

          limit = int(os.environ["MATRIX_LIMIT"])
          if not include:
              raise SystemExit("run-input manifest produced an empty matrix")
          if len(include) > limit:
              raise SystemExit(f"matrix has {len(include)} rows; GitHub limit is {limit}")
          budget_raw = os.environ.get("MAX_PROJECTED_MODEL_COST_USD", "").strip()
          if budget_raw:
              budget = float(budget_raw)
              if projected_model_cost > budget:
                  raise SystemExit(
                      f"projected model cost ${projected_model_cost:.2f} exceeds "
                      f"budget ${budget:.2f}"
                  )
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"matrix={json.dumps({'include': include}, separators=(',', ':'))}\n")
              output.write(f"case_count={len(seen_packet_rows)}\n")
              output.write(f"model_count={len(requested_model_keys)}\n")
              output.write(f"projected_model_cost_usd={projected_model_cost:.6f}\n")
          PY

      - name: Upload dispatch provenance
        if: ${{ !inputs.dry_run }}
        uses: actions/upload-artifact@v7
        with:
          name: official-dispatch-provenance-${{ github.run_id }}
          path: /tmp/lfb-dispatch-provenance.json
          if-no-files-found: error
          overwrite: true
          retention-days: ${{ fromJSON(steps.validate.outputs.artifact_retention_days) }}

  run-case:
    name: Run ${{ matrix.case_id }} / ${{ matrix.ablation }} / ${{ matrix.model_key }}
    needs: build-matrix
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 45
    environment: legalforecastbench-official-eval
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.build-matrix.outputs.max_parallel) }}
      matrix: ${{ fromJSON(needs.build-matrix.outputs.matrix) }}
    env:
      AWS_REGION: ${{ vars.LFB_AWS_REGION || 'us-east-1' }}
      LFB_GITHUB_PACKET_READ_ROLE_ARN: ${{ vars.LFB_GITHUB_PACKET_READ_ROLE_ARN }}
      LFB_ANTHROPIC_BEDROCK_MODEL_ID: ${{ vars.LFB_ANTHROPIC_BEDROCK_MODEL_ID }}
      LFB_ANTHROPIC_RUNTIME: ${{ vars.LFB_ANTHROPIC_RUNTIME }}
      LFB_PACKET_BUCKET: ${{ vars.LFB_PACKET_BUCKET }}
      LFB_RESULTS_BUCKET: ${{ vars.LFB_RESULTS_BUCKET }}
      MODEL_REGISTRY_URI: ${{ inputs.model_registry_uri }}
      RUN_INPUT_MANIFEST_URI: ${{ inputs.run_input_manifest_uri }}
    steps:
      - name: Checkout trusted release
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.build-matrix.outputs.release_sha }}

      - name: Dry-run matrix row
        if: ${{ inputs.dry_run }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Dry run: would evaluate ${CASE_ID} with ${ABLATION} using ${MODEL_KEY} from ${PACKET_OBJECT_KEY} (${PACKET_SHA256})."
        env:
          ABLATION: ${{ matrix.ablation }}
          CASE_ID: ${{ matrix.case_id }}
          MODEL_KEY: ${{ matrix.model_key }}
          PACKET_OBJECT_KEY: ${{ matrix.packet_object_key }}
          PACKET_SHA256: ${{ matrix.packet_sha256 }}

      - name: Install uv
        if: ${{ !inputs.dry_run }}
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Configure AWS OIDC credentials
        if: ${{ !inputs.dry_run }}
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: lfb-official-case-${{ github.run_id }}-${{ strategy.job-index }}
          role-to-assume: ${{ env.LFB_GITHUB_PACKET_READ_ROLE_ARN }}

      - name: Run isolated case evaluation
        if: ${{ !inputs.dry_run }}
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          required_env=(LFB_PACKET_BUCKET LFB_RESULTS_BUCKET RUN_INPUT_MANIFEST_URI MODEL_REGISTRY_URI MODEL_KEY EXPECTED_PACKET_OBJECT_KEY EXPECTED_PACKET_SHA256)
          case "${MODEL_KEY}" in
            openai:*) required_env+=(OPENAI_API_KEY) ;;
            anthropic:*)
              case "${LFB_ANTHROPIC_RUNTIME:-}" in
                bedrock|aws-bedrock|aws_bedrock)
                  required_env+=(AWS_REGION)
                  ;;
                *)
                  required_env+=(ANTHROPIC_API_KEY)
                  ;;
              esac
              ;;
            google:*|gemini:*) required_env+=(GEMINI_API_KEY) ;;
            *)
              echo "Unsupported model provider in model key: ${MODEL_KEY}" >&2
              exit 1
              ;;
          esac
          for name in "${required_env[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              missing+=("${name}")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required official evaluation values:\n' >&2
            printf '  - %s\n' "${missing[@]}" >&2
            exit 1
          fi
          run_input_manifest_for_cli="${RUN_INPUT_MANIFEST_URI}"
          model_registry_for_cli="${MODEL_REGISTRY_URI}"
          resume_args=()
          if [[ "${RESUME_EXISTING_RESULTS}" == "true" ]]; then
            resume_args+=(--resume-existing)
          fi
          case "${RUN_INPUT_MANIFEST_URI}" in
            manifests/*)
              run_input_manifest_for_cli="s3://${LFB_RESULTS_BUCKET}/${RUN_INPUT_MANIFEST_URI}"
              ;;
          esac
          case "${MODEL_REGISTRY_URI}" in
            manifests/*)
              model_registry_for_cli="s3://${LFB_RESULTS_BUCKET}/${MODEL_REGISTRY_URI}"
              ;;
          esac
          uv run legalforecast eval run-case \
            --manifest "${run_input_manifest_for_cli}" \
            --packet-store-root "s3://${LFB_PACKET_BUCKET}" \
            --expected-packet-object-key "${EXPECTED_PACKET_OBJECT_KEY}" \
            --expected-packet-sha256 "${EXPECTED_PACKET_SHA256}" \
            --results-store-root "s3://${LFB_RESULTS_BUCKET}/per-case/${CYCLE_ID}" \
            --repeat-count "${REPEAT_COUNT}" \
            --case-id "${CASE_ID}" \
            --ablation "${ABLATION}" \
            --output-dir "tmp/official-eval/${CASE_ID}/${ABLATION}/${MODEL_KEY_SLUG}" \
            --backend live \
            --model-registry "${model_registry_for_cli}" \
            --model-key "${MODEL_KEY}" \
            "${resume_args[@]}"
        env:
          ABLATION: ${{ matrix.ablation }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CASE_ID: ${{ matrix.case_id }}
          CYCLE_ID: ${{ inputs.cycle_id }}
          EXPECTED_PACKET_OBJECT_KEY: ${{ matrix.packet_object_key }}
          EXPECTED_PACKET_SHA256: ${{ matrix.packet_sha256 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LFB_ANTHROPIC_BEDROCK_MODEL_ID: ${{ vars.LFB_ANTHROPIC_BEDROCK_MODEL_ID }}
          LFB_ANTHROPIC_RUNTIME: ${{ vars.LFB_ANTHROPIC_RUNTIME }}
          MODEL_KEY: ${{ matrix.model_key }}
          MODEL_KEY_SLUG: ${{ matrix.model_key_slug }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REPEAT_COUNT: ${{ matrix.repeat_count }}
          RESUME_EXISTING_RESULTS: ${{ inputs.resume_existing_results }}

      - name: Upload per-case artifacts
        if: ${{ !inputs.dry_run && always() }}
        uses: actions/upload-artifact@v7
        with:
          name: official-eval-${{ matrix.case_id }}-${{ matrix.ablation }}-${{ matrix.model_key_slug }}
          path: tmp/official-eval/${{ matrix.case_id }}/${{ matrix.ablation }}/${{ matrix.model_key_slug }}
          if-no-files-found: warn
          overwrite: true
          retention-days: ${{ fromJSON(needs.build-matrix.outputs.artifact_retention_days) }}

  aggregate-results:
    name: Aggregate official results
    needs:
      - build-matrix
      - run-case
    if: ${{ !inputs.dry_run && needs.run-case.result == 'success' }}
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 30
    environment: legalforecastbench-official-eval
    permissions:
      contents: read
      id-token: write
    env:
      ABLATIONS: ${{ inputs.ablations }}
      ALLOW_NO_BASELINES: ${{ inputs.allow_no_baselines }}
      ARTIFACT_RETENTION_DAYS: ${{ needs.build-matrix.outputs.artifact_retention_days }}
      AWS_REGION: ${{ vars.LFB_AWS_REGION || 'us-east-1' }}
      BASELINE_TRAINING_EXAMPLES_URI: ${{ inputs.baseline_training_examples_uri }}
      CLEAN_MOTION_COUNT: ${{ inputs.clean_motion_count }}
      CYCLE_ID: ${{ inputs.cycle_id }}
      CYCLE_SERIES: ${{ inputs.cycle_series }}
      ELAPSED_DAYS: ${{ inputs.elapsed_days }}
      EXPECTED_FROZEN_MANIFEST_SHA256: ${{ needs.build-matrix.outputs.frozen_manifest_sha256 }}
      EXPECTED_LABELS_SHA256: ${{ needs.build-matrix.outputs.labels_sha256 }}
      LABELS_URI: ${{ inputs.labels_uri }}
      LFB_GITHUB_PACKET_READ_ROLE_ARN: ${{ vars.LFB_GITHUB_PACKET_READ_ROLE_ARN }}
      LFB_RESULTS_BUCKET: ${{ vars.LFB_RESULTS_BUCKET }}
      MODEL_KEYS: ${{ inputs.model_keys }}
      MODEL_REGISTRY_URI: ${{ inputs.model_registry_uri }}
      OFFICIAL_WINDOW_DAYS: ${{ inputs.official_window_days }}
      PREDICTION_UNIT_COUNT: ${{ inputs.prediction_unit_count }}
      RUN_INPUT_MANIFEST_URI: ${{ inputs.run_input_manifest_uri }}
    steps:
      - name: Checkout trusted release
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.build-matrix.outputs.release_sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Configure AWS OIDC credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: lfb-official-aggregate-${{ github.run_id }}
          role-to-assume: ${{ env.LFB_GITHUB_PACKET_READ_ROLE_ARN }}

      - name: Download aggregate inputs
        shell: bash
        run: |
          set -euo pipefail
          download_input() {
            local uri="$1"
            local destination="$2"
            case "${uri}" in
              s3://*)
                aws s3 cp "${uri}" "${destination}" --only-show-errors
                ;;
              manifests/*)
                if [[ -z "${LFB_RESULTS_BUCKET:-}" ]]; then
                  echo "LFB_RESULTS_BUCKET is required for manifests/ inputs." >&2
                  exit 1
                fi
                aws s3 cp "s3://${LFB_RESULTS_BUCKET}/${uri}" "${destination}" --only-show-errors
                ;;
              *)
                cp "${uri}" "${destination}"
                ;;
            esac
          }
          download_input "${RUN_INPUT_MANIFEST_URI}" /tmp/lfb-run-inputs-original.json
          download_input "${MODEL_REGISTRY_URI}" /tmp/lfb-model-registry.json
          download_input "${LABELS_URI}" /tmp/lfb-labels.jsonl
          if [[ -n "${BASELINE_TRAINING_EXAMPLES_URI//[[:space:]]/}" ]]; then
            download_input "${BASELINE_TRAINING_EXAMPLES_URI}" /tmp/lfb-baseline-training.jsonl
          fi

      - name: Rebuild and verify frozen run-input manifest
        shell: bash
        run: |
          set -euo pipefail
          # Re-download the mutable inputs and independently reproduce the exact
          # pre-fanout manifest. Only the two expected hashes cross between jobs.
          python - <<'PY'
          import hashlib
          import json
          import os
          import re
          from pathlib import Path

          manifest_path = Path("/tmp/lfb-run-inputs-original.json")
          labels_path = Path("/tmp/lfb-labels.jsonl")
          frozen_path = Path("/tmp/lfb-run-inputs.json")

          expected_labels = os.environ["EXPECTED_LABELS_SHA256"]
          expected_manifest = os.environ["EXPECTED_FROZEN_MANIFEST_SHA256"]
          for label, value in (
              ("labels", expected_labels),
              ("frozen manifest", expected_manifest),
          ):
              if re.fullmatch(r"[0-9a-f]{64}", value) is None:
                  raise SystemExit(f"expected {label} SHA-256 output is invalid")

          digest = hashlib.sha256()
          with labels_path.open("rb") as handle:
              for chunk in iter(lambda: handle.read(1024 * 1024), b""):
                  digest.update(chunk)
          labels_sha256 = digest.hexdigest()
          if labels_sha256 != expected_labels:
              raise SystemExit(
                  "labels changed after matrix construction; refusing aggregation"
              )

          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          if not isinstance(manifest, dict):
              raise SystemExit("run-input manifest must be a JSON object")
          cycle_id = manifest.get("cycle_id")
          if not isinstance(cycle_id, str) or not cycle_id.strip():
              raise SystemExit("run-input manifest requires cycle_id")
          if not isinstance(manifest.get("model_packets"), list):
              raise SystemExit("run-input manifest requires model_packets list")
          existing = manifest.get("labels_sha256")
          if existing not in (None, ""):
              if not isinstance(existing, str) or re.fullmatch(
                  r"[0-9a-f]{64}", existing
              ) is None:
                  raise SystemExit(
                      "existing labels_sha256 must be a lowercase SHA-256 hex digest"
                  )
              if existing != labels_sha256:
                  raise SystemExit(
                      "run-input manifest commits to different labels; "
                      "refusing aggregation"
                  )

          frozen_manifest = dict(manifest)
          frozen_manifest["labels_sha256"] = labels_sha256
          frozen_bytes = (
              json.dumps(frozen_manifest, indent=2, sort_keys=True) + "\n"
          ).encode("utf-8")
          frozen_manifest_sha256 = hashlib.sha256(frozen_bytes).hexdigest()
          if frozen_manifest_sha256 != expected_manifest:
              raise SystemExit(
                  "run-input manifest changed after matrix construction; "
                  "refusing aggregation"
              )
          frozen_path.write_bytes(frozen_bytes)
          print(f"verified labels: {labels_sha256}")
          print(f"verified frozen manifest: {frozen_manifest_sha256}")
          PY

      - name: Download dispatch provenance
        uses: actions/download-artifact@v7
        with:
          name: official-dispatch-provenance-${{ github.run_id }}
          path: /tmp

      - name: Download durable union of per-case artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/lfb-durable-results /tmp/lfb-per-case-artifacts/durable
          aws s3 sync \
            "s3://${LFB_RESULTS_BUCKET}/per-case/${CYCLE_ID}/" \
            /tmp/lfb-durable-results/ \
            --only-show-errors
          python - <<'PY'
          from pathlib import Path
          import shutil

          source = Path("/tmp/lfb-durable-results")
          destination = Path("/tmp/lfb-per-case-artifacts/durable")
          suffixes = {
              ".runs.jsonl": "runs.jsonl",
              ".accounting.jsonl": "accounting.jsonl",
              ".metrics.json": "metrics.json",
          }
          for runs_path in source.rglob("*.runs.jsonl"):
              run_stem = runs_path.name.removesuffix(".runs.jsonl")
              case_dir = destination / run_stem
              case_dir.mkdir(parents=True, exist_ok=True)
              for suffix, output_name in suffixes.items():
                  artifact = runs_path.with_name(f"{run_stem}{suffix}")
                  if not artifact.is_file():
                      raise SystemExit(
                          f"durable result is incomplete for {run_stem}: {artifact}"
                      )
                  shutil.copyfile(artifact, case_dir / output_name)
          PY

      - name: Download current dispatch per-case artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: official-eval-*
          path: /tmp/lfb-current-dispatch-artifacts

      - name: Aggregate official bundle
        shell: bash
        run: |
          set -euo pipefail
          optional_args=()
          if [[ -n "${ELAPSED_DAYS//[[:space:]]/}" ]]; then
            optional_args+=(--elapsed-days "${ELAPSED_DAYS}")
          fi
          if [[ -n "${OFFICIAL_WINDOW_DAYS//[[:space:]]/}" ]]; then
            optional_args+=(--official-window-days "${OFFICIAL_WINDOW_DAYS}")
          fi
          if [[ -n "${BASELINE_TRAINING_EXAMPLES_URI//[[:space:]]/}" ]]; then
            optional_args+=(--baseline-training-examples /tmp/lfb-baseline-training.jsonl)
          fi
          if [[ "${ALLOW_NO_BASELINES}" == "true" ]]; then
            optional_args+=(--allow-no-baselines)
          fi
          python - <<'PY'
          import json
          import os

          requested_ablations = [
              ablation.strip()
              for ablation in os.environ["ABLATIONS"].split(",")
              if ablation.strip()
          ]
          if not requested_ablations:
              raise SystemExit("ablations must include at least one packet ablation")
          requested_ablation_set = set(requested_ablations)
          with open("/tmp/lfb-run-inputs.json", encoding="utf-8") as handle:
              manifest = json.load(handle)
          packets = manifest.get("model_packets")
          if not isinstance(packets, list):
              raise SystemExit("run-input manifest must contain model_packets list")
          filtered_packets = []
          for packet in packets:
              if not isinstance(packet, dict):
                  raise SystemExit("model_packets entries must be objects")
              packet_ablation = packet.get("ablation") or "full_packet"
              if packet_ablation in requested_ablation_set:
                  filtered_packets.append(packet)
          if not filtered_packets:
              raise SystemExit(
                  "run-input manifest has no model packets for requested ablations"
              )
          manifest["model_packets"] = filtered_packets
          with open(
              "/tmp/lfb-run-inputs-requested-ablations.json",
              "w",
              encoding="utf-8",
          ) as handle:
              json.dump(manifest, handle, indent=2, sort_keys=True)
              handle.write("\n")
          PY
          uv run python -m legalforecast.publication.official_aggregate \
            --per-case-dir /tmp/lfb-per-case-artifacts \
            --run-input-manifest /tmp/lfb-run-inputs-requested-ablations.json \
            --model-registry /tmp/lfb-model-registry.json \
            --dispatch-provenance /tmp/lfb-dispatch-provenance.json \
            --labels /tmp/lfb-labels.jsonl \
            --output-dir tmp/official-aggregate \
            --cycle-id "${CYCLE_ID}" \
            --cycle-series "${CYCLE_SERIES}" \
            --clean-motion-count "${CLEAN_MOTION_COUNT}" \
            --prediction-unit-count "${PREDICTION_UNIT_COUNT}" \
            --deferred-ablation "judge_removed" \
            "${optional_args[@]}"

      - name: Publish aggregate bundle to S3
        shell: bash
        run: |
          set -euo pipefail
          aws s3 sync \
            tmp/official-aggregate/public \
            "s3://${LFB_RESULTS_BUCKET}/reports/${CYCLE_ID}/multi-ablation/" \
            --only-show-errors

      - name: Upload aggregate artifact
        uses: actions/upload-artifact@v7
        with:
          name: official-aggregate-${{ inputs.cycle_id }}-multi-ablation
          path: tmp/official-aggregate
          if-no-files-found: error
          overwrite: true
          retention-days: ${{ fromJSON(env.ARTIFACT_RETENTION_DAYS) }}
