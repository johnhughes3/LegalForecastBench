name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type-check
        run: uv run pyright

      - name: Test
        run: uv run pytest -q

      - name: Rebuild and verify packet renders
        run: |
          set -euo pipefail
          rm -rf tmp/ci-packet-render
          uv run python legalforecast/publication/private_store_export.py \
            --source-dir tests/fixtures/packet_render_ci \
            --output-dir tmp/ci-packet-render \
            --cycle-id ci-packet-render
          uv run scripts/reconstruct_packets.py \
            --manifest tmp/ci-packet-render/objects/results/manifests/ci-packet-render.public-reconstruction.json \
            --output tmp/ci-packet-render/packet-render-verification.json \
            --verify-packet-render-dir tmp/ci-packet-render/objects/packet

      - name: Build package
        run: uv build --out-dir tmp/ci-dist
