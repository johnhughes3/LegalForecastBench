name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --locked

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type-check
        run: uv run pyright

      - name: Check public API docstring coverage
        run: >-
          uv run interrogate
          legalforecast/publication
          legalforecast/labeling
          scripts

      - name: Test
        run: uv run pytest -q

      - name: Rebuild and verify packet renders
        run: |
          set -euo pipefail
          rm -rf tmp/ci-packet-render
          uv run legalforecast acquisition build-packets \
            --input tests/fixtures/packet_render_ci/packet-build-input.jsonl \
            --output-root tmp/ci-packet-render \
            --packets-output tmp/ci-packet-render/packets.jsonl \
            --case-packets-output tmp/ci-packet-render/case-packets.jsonl \
            --audit-output tmp/ci-packet-render/packet-audit.jsonl \
            --execute
          diff -u tests/fixtures/packet_render_ci/expected-packets.jsonl tmp/ci-packet-render/packets.jsonl
          uv run scripts/reconstruct_packets.py \
            --manifest tests/fixtures/packet_render_ci/expected-packet-render.json \
            --output tmp/ci-packet-render/packet-render-verification.json \
            --verify-packet-render-dir tmp/ci-packet-render

      - name: Build package
        run: uv build --out-dir tmp/ci-dist
