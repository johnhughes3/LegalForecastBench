name: Fan In Official Shards

on:
  workflow_dispatch:
    inputs:
      release_sha:
        description: Exact trusted commit to verify; it must be reachable from origin/main.
        required: true
        type: string
      cycle_id:
        description: Frozen cycle whose immutable shard receipts will be selected.
        required: true
        type: string
      freeze_bundle_path:
        description: Committed current freeze bundle path.
        required: true
        type: string
      source_dispatch_run_id:
        description: Workflow run whose frozen dispatch artifact supplies the exact run-input, labels, and registry bytes.
        required: true
        type: number
      accepted_attempt_map_path:
        description: Optional committed manifests/ accepted-attempt map for ambiguous shards.
        required: false
        default: ""
        type: string
      verify_only:
        description: Verify and aggregate locally without any canonical report write.
        required: true
        default: true
        type: boolean
      clean_motion_count:
        description: Optional assertion; fan-in derives the authoritative count from frozen artifacts.
        required: false
        default: ""
        type: string
      prediction_unit_count:
        description: Optional assertion; fan-in derives the authoritative count from frozen artifacts.
        required: false
        default: ""
        type: string
      baseline_training_examples_path:
        description: Optional frozen baseline-training corpus path.
        required: false
        default: ""
        type: string
      artifact_retention_days:
        description: Retention for the sanitized fan-in verification report.
        required: true
        default: "30"
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: official-fan-in-${{ inputs.cycle_id }}
  cancel-in-progress: false

jobs:
  fan-in-results:
    name: Verify accepted shard attempts and fan in
    runs-on: ${{ vars.CI_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 45
    environment: legalforecastbench-official-eval-fan-in
    permissions:
      actions: read
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ vars.LFB_AWS_REGION || 'us-east-1' }}
      LFB_GITHUB_FAN_IN_ROLE_ARN: ${{ vars.LFB_GITHUB_FAN_IN_ROLE_ARN }}
      LFB_RESULTS_BUCKET: ${{ vars.LFB_RESULTS_BUCKET }}
    steps:
      - name: Checkout trusted release
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.release_sha }}

      - name: Validate trusted immutable inputs
        shell: bash
        env:
          ACCEPTED_MAP: ${{ inputs.accepted_attempt_map_path }}
          CYCLE_ID: ${{ inputs.cycle_id }}
          FREEZE_BUNDLE: ${{ inputs.freeze_bundle_path }}
          RELEASE_SHA: ${{ inputs.release_sha }}
          SOURCE_DISPATCH_RUN_ID: ${{ inputs.source_dispatch_run_id }}
          VERIFY_ONLY: ${{ inputs.verify_only }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          [[ "${RELEASE_SHA}" =~ ^[0-9a-f]{40}$ ]] || {
            echo "release_sha must be a full lowercase commit SHA" >&2
            exit 1
          }
          checked_out_sha="$(git rev-parse HEAD)"
          [[ "${checked_out_sha}" == "${RELEASE_SHA}" ]] || {
            echo "checked-out HEAD does not equal release_sha" >&2
            exit 1
          }
          git merge-base --is-ancestor "${checked_out_sha}" origin/main || {
            echo "release_sha must be reachable from origin/main" >&2
            exit 1
          }
          [[ "${CYCLE_ID}" =~ ^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$ ]] || {
            echo "cycle_id contains unsafe characters" >&2
            exit 1
          }
          [[ "${SOURCE_DISPATCH_RUN_ID}" =~ ^[1-9][0-9]*$ ]] || {
            echo "source_dispatch_run_id must be a positive integer" >&2
            exit 1
          }
          [[ -f "${FREEZE_BUNDLE}" ]] || {
            echo "freeze_bundle_path is not a checked-out file" >&2
            exit 1
          }
          if [[ -n "${ACCEPTED_MAP//[[:space:]]/}" ]]; then
            [[ -f "${ACCEPTED_MAP}" ]] || {
              echo "accepted_attempt_map_path is not a checked-out file" >&2
              exit 1
            }
            if [[ "${VERIFY_ONLY}" != "true" ]]; then
              case "${ACCEPTED_MAP}" in
                manifests/*) ;;
                *)
                  echo "publishing accepted-attempt map must be under manifests/" >&2
                  exit 1
                  ;;
              esac
              git ls-files --error-unmatch -- "${ACCEPTED_MAP}" >/dev/null
              git diff --quiet HEAD -- "${ACCEPTED_MAP}"
            fi
          fi

      - name: Download exact frozen dispatch inputs
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: official-dispatch-provenance-${{ inputs.source_dispatch_run_id }}
          path: /tmp/lfb-source-dispatch
          github-token: ${{ github.token }}
          run-id: ${{ inputs.source_dispatch_run_id }}

      - name: Validate frozen dispatch artifact
        shell: bash
        env:
          RELEASE_SHA: ${{ inputs.release_sha }}
          SOURCE_DISPATCH_RUN_ID: ${{ inputs.source_dispatch_run_id }}
        run: |
          set -euo pipefail
          for path in \
            /tmp/lfb-source-dispatch/lfb-dispatch-release.json \
            /tmp/lfb-source-dispatch/lfb-run-inputs-frozen.json \
            /tmp/lfb-source-dispatch/lfb-labels.jsonl \
            /tmp/lfb-source-dispatch/lfb-model-registry.json; do
            [[ -f "${path}" ]] || {
              echo "source dispatch artifact is missing ${path}" >&2
              exit 1
            }
          done
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("/tmp/lfb-source-dispatch/lfb-dispatch-release.json")
          try:
              release = json.loads(path.read_text(encoding="utf-8"))
          except (OSError, json.JSONDecodeError) as exc:
              raise SystemExit("source dispatch release provenance is invalid JSON") from exc
          expected_fields = {"schema_version", "workflow_run_id", "release_sha"}
          if not isinstance(release, dict) or set(release) != expected_fields:
              raise SystemExit("source dispatch release provenance fields mismatch")
          if release["schema_version"] != "legalforecast.dispatch_release.v1":
              raise SystemExit("source dispatch release provenance schema mismatch")
          source_dispatch_run_id = os.environ["SOURCE_DISPATCH_RUN_ID"]
          if release["workflow_run_id"] != source_dispatch_run_id:
              raise SystemExit("source dispatch provenance workflow run mismatch")
          expected_release_sha = os.environ["RELEASE_SHA"]
          if release["release_sha"] != expected_release_sha:
              raise SystemExit("source dispatch provenance release SHA mismatch")
          PY

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.1.6
        with:
          enable-cache: true

      - name: Configure fan-in AWS authority
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: lfb-fan-in-${{ github.run_id }}-${{ github.run_attempt }}
          role-to-assume: ${{ env.LFB_GITHUB_FAN_IN_ROLE_ARN }}

      - name: Verify receipts and aggregate accepted exact versions
        shell: bash
        env:
          ACCEPTED_MAP: ${{ inputs.accepted_attempt_map_path }}
          BASELINES: ${{ inputs.baseline_training_examples_path }}
          CLEAN_MOTION_COUNT: ${{ inputs.clean_motion_count }}
          CYCLE_ID: ${{ inputs.cycle_id }}
          FREEZE_BUNDLE: ${{ inputs.freeze_bundle_path }}
          PREDICTION_UNIT_COUNT: ${{ inputs.prediction_unit_count }}
          SOURCE_DISPATCH_RUN_ID: ${{ inputs.source_dispatch_run_id }}
          VERIFY_ONLY: ${{ inputs.verify_only }}
        run: |
          set -euo pipefail
          args=(
            --freeze-bundle "${FREEZE_BUNDLE}"
            --run-input-manifest /tmp/lfb-source-dispatch/lfb-run-inputs-frozen.json
            --labels /tmp/lfb-source-dispatch/lfb-labels.jsonl
            --model-registry /tmp/lfb-source-dispatch/lfb-model-registry.json
            --source-dispatch-run-id "${SOURCE_DISPATCH_RUN_ID}"
            --receipt-root "s3://${LFB_RESULTS_BUCKET}"
            --output-dir tmp/official-fan-in
          )
          while IFS= read -r bundle_path; do
            if [[ "${bundle_path}" != "${FREEZE_BUNDLE}" ]]; then
              args+=(--amendment-bundle "${bundle_path}")
            fi
          done < <(find manifests -type f -name '*.freeze.json' -print | sort)
          [[ -z "${ACCEPTED_MAP//[[:space:]]/}" ]] || args+=(--accepted-attempt-map "${ACCEPTED_MAP}")
          [[ -z "${BASELINES//[[:space:]]/}" ]] || args+=(--baseline-training-examples "${BASELINES}")
          [[ -z "${CLEAN_MOTION_COUNT//[[:space:]]/}" ]] || args+=(--clean-motion-count "${CLEAN_MOTION_COUNT}")
          [[ -z "${PREDICTION_UNIT_COUNT//[[:space:]]/}" ]] || args+=(--prediction-unit-count "${PREDICTION_UNIT_COUNT}")
          if [[ "${VERIFY_ONLY}" == "true" ]]; then
            uv run python -m legalforecast.publication.shard_fan_in \
              --verify-only "${args[@]}"
          else
            uv run python -m legalforecast.publication.shard_fan_in_publish \
              --publish-root "s3://${LFB_RESULTS_BUCKET}/reports/${CYCLE_ID}/multi-ablation/" \
              "${args[@]}"
          fi

      - name: Upload sanitized fan-in verification report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.0
        with:
          name: official-fan-in-${{ inputs.cycle_id }}-${{ github.run_id }}
          path: tmp/official-fan-in/fan-in-report.json
          if-no-files-found: error
          retention-days: ${{ fromJSON(inputs.artifact_retention_days) }}
