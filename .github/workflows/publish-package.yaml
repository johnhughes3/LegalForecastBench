name: Publish Python Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-check:
    name: Release check
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78
        with:
          enable-cache: true

      - name: Run release checks
        run: uv run scripts/release_check.py --output-dir tmp/release-check

      - name: Upload release-check artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: release-check
          path: tmp/release-check
          if-no-files-found: error

  publish:
    name: Publish package
    needs: release-check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
    environment:
      name: pypi

    steps:
      - name: Download release-check artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: release-check
          path: tmp/release-check

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247
        with:
          packages-dir: tmp/release-check/dist
          skip-existing: true

      - name: Publish GitHub release metadata
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          prerelease: ${{ contains(github.ref_name, 'a') || contains(github.ref_name, 'alpha') }}
          files: |
            tmp/release-check/dist/*.whl
            tmp/release-check/dist/*.tar.gz
            tmp/release-check/package-artifact-hashes.json
